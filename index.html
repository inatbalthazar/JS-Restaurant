<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen D &mdash; Premium Dining</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="#" class="logo">Gen D</a>
            <ul class="nav-links">
                <li><a href="#menu" class="active">Menu</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#reservation">Reservations</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <button class="lang-btn lang-switcher">EN</button>
                <button class="dark-toggle" aria-label="Toggle dark mode">☀️</button>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <span class="hero-since">Est. 2026</span>
            <h1>Our <em>Menu</em></h1>
            <p>Curated flavors from the <span style="color: yellow;"><em>Gen D </em></span>Kitchen</p>
            <a href="#menu" class="btn-hero">Explore Dishes</a>
        </div>
    </section>

    <section class="menu-section" id="menu">
        <div class="section-heading">
            <span class="section-sub">Handpicked Selection</span>
            <h2>Today's Offerings</h2>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="Italian">Italian</button>
            <button class="filter-btn" data-filter="American">American</button>
            <button class="filter-btn" data-filter="Japanese">Japanese</button>
            <button class="filter-btn" data-filter="Mexican">Mexican</button>
            <button class="filter-btn" data-filter="Thai">Thai</button>
        </div>

        <div class="menu-grid" id="menuGrid"></div>
    </section>

    <section class="reservation-section" id="reservation"></section>

    <section class="about-section" id="about"></section>

    <section class="contact-section" id="contact"></section>

    <footer>
        <div class="footer-inner">
            <div class="footer-brand">
                <span class="footer-logo">Gen D</span>
                <p>Fine dining crafted with passion.</p>
            </div>
            <p class="footer-copy">&copy; 2026 Gen D. All rights reserved.</p>
        </div>
    </footer>

    <script src="my-array.js"></script>
    <script src="my-object.js"></script>
    <script src="app.js"></script>


</body>
</html>
